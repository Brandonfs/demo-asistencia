<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asistencia | Inicio</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <section class="hero">
        <h1>Demo de asistencia por módulos</h1>
        <p>Selecciona el flujo que quieres mostrar o probar.</p>
      </section>

      <section class="panel landing-grid">
        <a class="landing-card" href="/user.html" data-module="user">
          <h2>Usuario</h2>
          <p>Registro del empleado, cámara y escaneo del QR.</p>
        </a>
        <a class="landing-card" href="/qr.html" data-module="qr">
          <h2>QR</h2>
          <p>Generación del código QR por sede y tipo de registro.</p>
        </a>
        <a class="landing-card" href="/admin.html" data-module="admin">
          <h2>Admin</h2>
          <p>Gestión de sedes y revisión de registros.</p>
        </a>
      </section>
    </main>
    <script>
      document.querySelectorAll('.landing-card').forEach((card) => {
        card.addEventListener('click', (event) => {
          event.preventDefault();
          const module = card.getAttribute('data-module');
          localStorage.setItem('activeModule', module);
          window.location.href = card.getAttribute('href');
        });
      });
    </script>
  </body>
</html>
