<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Usuario | Asistencia</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <nav class="top-nav">
        <a href="/">Inicio</a>
        <a href="/user.html" class="active">Usuario</a>
        <a href="/qr.html">QR</a>
        <a href="/admin.html">Admin</a>
      </nav>

      <section class="panel">
        <h1>Usuario</h1>
        <p>Ingresa tus datos, abre la cámara y escanea el QR para registrar tu asistencia.</p>
        <form id="userForm" class="grid compact">
          <label>
            CC
            <input id="userDocument" required placeholder="Ej. 1020304050" />
          </label>
          <label>
            Nombre completo
            <input id="userName" required placeholder="Ej. Laura Martínez" />
          </label>
          <label>
            Correo
            <input id="userEmail" type="email" placeholder="Ej. laura@empresa.com" />
          </label>
          <label>
            Teléfono
            <input id="userPhone" placeholder="Ej. 3001234567" />
          </label>
          <button type="submit">Listo para escanear</button>
        </form>
        <div id="statusBanner" class="status-banner">Ingresa tus datos para continuar.</div>
        <button id="startUserScannerBtn" class="secondary">Abrir cámara</button>
        <div id="scanSummary" class="summary-card hidden">
          <h3>Registro capturado</h3>
          <p><strong>Nombre:</strong> <span id="summaryName">-</span></p>
          <p><strong>CC:</strong> <span id="summaryDocument">-</span></p>
          <p><strong>Correo:</strong> <span id="summaryEmail">-</span></p>
          <p><strong>Teléfono:</strong> <span id="summaryPhone">-</span></p>
          <p><strong>Estado:</strong> <span id="summaryStatus">-</span></p>
        </div>
        <div class="reader-wrapper">
          <div class="reader-frame"></div>
          <video id="userReader" class="reader" autoplay playsinline muted></video>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
