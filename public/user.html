<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Usuario | Asistencia</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <nav class="top-nav">
        <a href="/" data-module="home">Inicio</a>
        <a href="/user.html" class="active" data-module="user">Usuario</a>
        <a href="/qr.html" data-module="qr">QR</a>
        <a href="/admin.html" data-module="admin">Admin</a>
      </nav>

      <section class="panel">
        <h1>Usuario</h1>
        <p>Ingresa tus datos, abre la cámara y escanea el QR para registrar tu asistencia.</p>
        <form id="userForm" class="grid compact">
          <label>
            CC
            <input id="userDocument" required placeholder="Ej. 1020304050" />
          </label>
          <label>
            Nombre completo
            <input id="userName" required placeholder="Ej. Laura Martínez" />
          </label>
          <button type="submit">Listo para escanear</button>
        </form>
        <div id="statusBanner" class="status-banner">Ingresa tus datos para continuar.</div>
        <button id="startUserScannerBtn" class="secondary">Abrir cámara</button>
        <div class="reader-wrapper">
          <div class="reader-frame"></div>
          <video id="userReader" class="reader" autoplay playsinline muted></video>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
    <script>
      document.querySelectorAll('.top-nav a').forEach((link) => {
        link.addEventListener('click', (event) => {
          event.preventDefault();
          const module = link.getAttribute('data-module');
          localStorage.setItem('activeModule', module);
          window.location.href = link.getAttribute('href');
        });
      });
    </script>
  </body>
</html>
