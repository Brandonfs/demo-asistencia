<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin | Asistencia</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <nav class="top-nav">
        <a href="/" data-module="home">Inicio</a>
        <a href="/user.html" data-module="user">Usuario</a>
        <a href="/qr.html" data-module="qr">QR</a>
        <a href="/admin.html" class="active" data-module="admin">Admin</a>
      </nav>

      <section class="panel">
        <h1>Admin</h1>
        <div id="adminAuthPanel">
          <form id="adminLoginForm" class="grid compact">
            <label>
              Usuario
              <input id="adminUsername" required placeholder="admin" />
            </label>
            <label>
              Contraseña
              <input id="adminPassword" type="password" required placeholder="admin123" />
            </label>
            <button type="submit">Ingresar</button>
          </form>
          <p id="adminStatus" class="status">Inicia sesión con admin / admin123.</p>
        </div>

        <div id="adminTools" class="hidden">
          <form id="branchForm" class="grid compact">
            <label>
              Nombre de la sede
              <input id="branchName" required placeholder="Ej. Sede Norte" />
            </label>
            <label>
              Ubicación
              <input id="branchLocation" placeholder="Ej. Medellín" />
            </label>
            <button type="submit">Agregar sede</button>
          </form>

          <div class="toolbar">
            <button id="logoutAdminBtn" class="secondary" type="button">Cerrar sesión</button>
          </div>

          <div class="filters-panel">
            <label>
              Tipo
              <select id="attendanceTypeFilter">
                <option value="all">Todos</option>
                <option value="entrada">Entrada</option>
                <option value="salida">Salida</option>
              </select>
            </label>
            <label>
              Hora límite para tardanza
              <input id="lateThresholdInput" type="time" value="08:30" />
            </label>
            <label class="toggle-label">
              <span>Activar filtro de tardanza</span>
              <input id="lateThresholdEnabled" type="checkbox" checked />
            </label>
            <button id="applyFiltersBtn" type="button">Aplicar filtros</button>
            <button id="exportExcelBtn" type="button" class="secondary">Exportar Excel</button>
            <button id="exportPdfBtn" type="button" class="secondary">Exportar PDF</button>
          </div>

          <h3>Registros de asistencia</h3>
          <table>
            <thead>
              <tr>
                <th>Fecha</th>
                <th>Cédula</th>
                <th>Trabajador</th>
                <th>Sede</th>
                <th>Tipo</th>
                <th>Hora</th>
                <th>Acción</th>
              </tr>
            </thead>
            <tbody id="attendanceRows"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
    <script>
      document.querySelectorAll('.top-nav a').forEach((link) => {
        link.addEventListener('click', (event) => {
          event.preventDefault();
          const module = link.getAttribute('data-module');
          localStorage.setItem('activeModule', module);
          window.location.href = link.getAttribute('href');
        });
      });
    </script>
  </body>
</html>
